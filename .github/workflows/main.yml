name: XAUUSD Institutional Analysis

on:
  schedule:
    # Run រាល់ដើមម៉ោងនៅកម្ពុជា (UTC+7)
    # 01:00 UTC = 08:00 AM KH (Asia Session)
    # 07:00 UTC = 02:00 PM KH (London Session)
    # 12:00 UTC = 07:00 PM KH (NY Session)
    - cron: '0 1,7,12 * * 1-5'
  workflow_dispatch: # ប៊ូតុងសម្រាប់ចុច Run តេស្តដោយផ្ទាល់

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Run Analysis Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
