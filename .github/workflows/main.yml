name: XAUUSD SMC Hunter Bot

on:
  schedule:
    # ឱ្យ Bot រត់រាល់ ១៥ នាទីម្តង (គ្រប់គ្រាន់សម្រាប់ចាប់ Liquidity Sweep)
    - cron: '*/15 * * * *'
  workflow_dispatch: # សម្រាប់ឱ្យបងចុច Run Test ដោយដៃបាន

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas pytz

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
          TOPIC_ANALYSIS: ${{ secrets.TOPIC_ANALYSIS }}
          TOPIC_ALERTS: ${{ secrets.TOPIC_ALERTS }}
        run: python bot.py
        
