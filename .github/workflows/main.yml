name: XAUUSD Institutional Bot V2

on:
  schedule:
    # ឱ្យ GitHub ដាស់ Bot ឱ្យភ្ញាក់រៀងរាល់ ៥ នាទីម្តង (ច័ន្ទ-សុក្រ)
    # នេះជាល្បឿនលឿនបំផុត ដើម្បីចាប់យក SMC Alerts ឱ្យទាន់ពេល
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # សម្រាប់ឱ្យបងចុច Run តេស្តដោយដៃ

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    
    # កំណត់ Timeout ត្រឹម ៥ នាទី (ការពារកូដជាប់គាំង កុំឱ្យខាត Quota)
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # ជួយឱ្យការ Run លើកក្រោយៗលឿនជាងមុន

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Execute SMC Bot
        env:
          # ប្រាកដថាបងបានដាក់ Secrets ទាំងនេះក្នុង Settings រួចរាល់
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
