name: XAUUSD Institutional Bot V2

on:
  schedule:
    # ឱ្យ GitHub ដាស់ Bot ឱ្យភ្ញាក់រៀងរាល់ ៥ នាទីម្តង (ច័ន្ទ-សុក្រ) តាមម៉ោង UTC
    # ម៉ោង 01:00 UTC = 08:00 ព្រឹក ម៉ោងខ្មែរ
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # សម្រាប់ឱ្យបងចុច Run តេស្តដោយដៃបានគ្រប់ពេល

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    
    # កំណត់ Timeout ត្រឹម ៥ នាទី (ការពារកូដជាប់គាំង កុំឱ្យខាត Quota)
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # ជួយឱ្យការ Run លើកក្រោយៗលឿនស្លេវ

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Execute SMC Bot
        env:
          # ត្រូវប្រាកដថាបងបានដាក់ Secrets ទាំងនេះក្នុង Settings > Secrets and variables > Actions រួចរាល់
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
