name: E11 Concept 2.0 Sovereign

on:
  schedule:
    # រត់រៀងរាល់ 10 នាទីម្តង ដើម្បីចាប់ SFP គ្រប់ TF ឱ្យទាន់ពេល
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy requests pytz

      - name: Run E11 Sniper Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
