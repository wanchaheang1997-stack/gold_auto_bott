name: Gold Sovereign Sniper V10.8

on:
  schedule:
    # ឱ្យ Bot រត់រៀងរាល់ ៣០ នាទីម្តង (ឬបងអាចដូរមក ១៥ នាទីម្តងបាន)
    - cron: '*/30 * * * *'
  workflow_dispatch: # សម្រាប់ឱ្យបងចុច Run ផ្ទាល់ដៃបានគ្រប់ពេល

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: symbols/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Run Sovereign Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
