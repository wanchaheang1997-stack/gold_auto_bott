name: XAUUSD Institutional Bot V2

on:
  schedule:
    # Run រៀងរាល់ ៥ នាទីម្តង (ចាប់ពីថ្ងៃច័ន្ទ ដល់ សុក្រ)
    # នេះជាល្បឿនលឿនបំផុតដែល GitHub Free អាចធ្វើបានសម្រាប់ Real-time Alerts
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # ប៊ូតុងសម្រាប់ចុច Run តេស្តដោយដៃ

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    
    # បន្ថែម timeout ដើម្បីការពារការជាប់គាំង (កុំឱ្យលើស ៥ នាទី)
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # ប្រើ Cache ដើម្បីឱ្យវា Install dependencies លឿនជាងមុន

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Execute SMC Bot
        env:
          # ប្រាកដថាបងបានដាក់ Secrets ទាំងនេះក្នុង GitHub Settings រួចរាល់
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
