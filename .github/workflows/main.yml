name: E11 Sniper Bot V15

on:
  schedule:
    # ម៉ោងកម្ពុជា = UTC + 7
    # 01:00 UTC = 08:00 AM KH
    # 03:00 UTC = 10:00 AM KH ... រហូតដល់ 15:00 UTC = 22:00 PM KH
    - cron: '0 1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch: # សម្រាប់ចុច Run ដោយដៃ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install yfinance pandas numpy requests pytz
      - name: Run Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
