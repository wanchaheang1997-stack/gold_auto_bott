name: Gold Sovereign E11 v2.0

on:
  schedule:
    # រត់រៀងរាល់ ១៥ នាទីម្ដង (ស្មើនឹង ៩៦ ដងក្នុងមួយថ្ងៃ)
    - cron: '*/15 * * * *'
  workflow_dispatch: # ប៊ូតុងសម្រាប់ចុច Run តេស្តដោយផ្ទាល់ដៃ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Run E11 v2.0 Trinity Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
