name: E11 Master Sniper V28
on:
  schedule:
    # រត់រៀងរាល់ 5 នាទី (24 ម៉ោង ថ្ងៃច័ន្ទ-សុក្រ)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # ប៊ូតុងសម្រាប់ចុច Run តេស្តដោយដៃ
jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy requests pytz tradingview-ta

      - name: Run Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
