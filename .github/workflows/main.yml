name: Gold Auto Bot

on:
  schedule:
    - cron: '*/15 * * * *' # ឱ្យវារត់រាល់ ១៥ នាទីម្តង
  workflow_dispatch: # សម្រាប់ឱ្យបងចុច Run ដោយដៃបាន

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: ambassadors/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
        
