name: XAUUSD Institutional Bot V2

on:
  schedule:
    # бһұбҹ’бһҷ GitHub Actions бһҠбһ¶бһҹбҹӢ Bot бһұбҹ’бһҷбһ—бҹ’бһүбһ¶бһҖбҹӢбһҡбҹҖбһ„бһҡбһ¶бһӣбҹӢ бҹҘ бһ“бһ¶бһ‘бһёбһҳбҹ’бһҸбһ„ (бһ…бҹҗбһ“бҹ’бһ‘-бһҹбһ»бһҖбҹ’бһҡ)
    # бһңбһ¶бһ“бһ№бһ„бһҡбһҸбҹӢбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҸбһ¶бһҳбһҳбҹүбҹ„бһ„бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһҠбҹӮбһӣбһҷбһҫбһ„бһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ bot.py
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһұбҹ’бһҷбһ”бһ„бһ…бһ»бһ…бһ”бҹҠбһјбһҸбһ»бһ„ Run бһҸбҹҒбһҹбҹ’бһҸбһҠбҹ„бһҷбһҠбҹғбһ”бһ¶бһ“бһӮбҹ’бһҡбһ”бҹӢбһ–бҹҒбһӣ

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    
    # бһҖбҹҶбһҺбһҸбҹӢбһ–бҹҒбһӣбһҲбһ”бҹӢ (Timeout) бһҸбҹ’бһҡбһ№бһҳ бҹҘ бһ“бһ¶бһ‘бһё бһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ»бҹҶбһұбҹ’бһҷбһҒбһ¶бһҸ Quota
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # бһ”бҹ’бһҡбһҫ Cache бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҖбһ¶бһҡбһҠбҹҶбһЎбһҫбһ„ Library бһӣбһҝбһ“бһҹбҹ’бһӣбҹҒбһң

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Execute SMC Bot
        env:
          # бһ‘бһ¶бһүбһҷбһҖбһӣбҹҒбһҒ Token бһ“бһ·бһ„ ID бһ–бһё Settings > Secrets > Actions бһҡбһ”бһҹбҹӢбһ”бһ„
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
