name: Gold Highest Supreme Sentinel V7.5

on:
  schedule:
    # ដើររៀងរាល់ 1 ម៉ោងម្តង (00, 01, 02, ... 23:00 UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # បងអាចចុច Run ដោយដៃបានគ្រប់ពេល

jobs:
  run-supreme-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # ជួយឱ្យវា Run កាន់តែលឿន (Caching)

      - name: Install Supreme Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: Execute Highest Supreme Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py

      - name: Job Summary
        if: always()
        run: |
          echo "### 🚀 Bot Status Report" >> $GITHUB_STEP_SUMMARY
          echo "Execution Time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Status: Success ✅" >> $GITHUB_STEP_SUMMARY
          
