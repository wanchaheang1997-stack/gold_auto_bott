name: E11 Master Sniper V37 - Intelligence
on:
  schedule:
    # រត់រៀងរាល់ 5 នាទី ជារៀងរាល់ថ្ងៃច័ន្ទ ដល់ សុក្រ (ម៉ោងទីផ្សារមាស)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # សម្រាប់ចុច Run តេស្តដោយដៃភ្លាមៗ
jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 3. Install required libraries
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests pytz

      - name: 4. Execute E11 Pro Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
        run: python bot.py
        
